name = "iris"
main = "worker/worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["enable_weak_ref", "nodejs_compat"]
assets = { not_found_handling = "single-page-application" }
preview_urls = true

[limits]
cpu_ms = 60_000

[ai]
binding = "AI"

[observability]
enabled = true

[[routes]]
pattern = "iris.yinflow.life"
custom_domain = true

# Set up the durable objects
[durable_objects]
bindings = [
    { name = "AGENT_DURABLE_OBJECT", class_name = "AgentDurableObject" },
    { name = "VOICE_AGENT_DO", class_name = "VoiceAgentDurableObject" },
    { name = "AGGREGATION_DO", class_name = "AggregationDO" },
    { name = "TLDRAW_SYNC_DO", class_name = "TldrawSyncDO" },
]

# Durable objects require migrations to create/modify/delete them
[[migrations]]
tag = "v1"
new_classes = ["TldrawAiDurableObject"]

[[migrations]]
tag = "v2"
renamed_classes = [
    { from = "TldrawAiDurableObject", to = "AgentDurableObject" },
]

[[migrations]]
tag = "v3"
new_classes = ["VoiceAgentDurableObject"]

[[migrations]]
tag = "v4"
new_classes = ["AggregationDO"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["TldrawSyncDO"]

[[r2_buckets]]
binding = "FL_BUCKET"
bucket_name = "iris-fl-rounds"

[[r2_buckets]]
binding = "TLDRAW_BUCKET"
bucket_name = "iris-tldraw-assets"

# D1 database for user accounts
[[d1_databases]]
binding = "DB"
database_name = "iris-users"
database_id = "b57943a1-2ba4-4f32-8cbe-3cef9a4b6d68"

[vars]
DEV_MODE = "true"
TTS_ENABLED = "false"
OPENAI_COMPATIBLE_BASE_URL = "http://127.0.0.1:3456/v1"
OPENAI_COMPATIBLE_API_KEY = "not-needed"
TEAM_DOMAIN = "https://yinflow.cloudflareaccess.com"
POLICY_AUD = "95934ffad4c797a31e9be9d503de7ad34ff036653a4fb7ea008a934a5dc61598"
